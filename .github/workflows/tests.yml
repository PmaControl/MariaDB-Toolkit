name: Tests

on:
  push:
  pull_request:

jobs:
  shellcheck-and-bats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats

      - name: ShellCheck
        run: ./tests/run-shellcheck.sh

      - name: Bats
        run: bats tests/mariadb_storage_audit.bats
